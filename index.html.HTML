<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Family Bazar</title>

<style>
body { font-family: Arial; margin: 0; }

/* Header */
header {
    background: #ff6600;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Navbar */
nav {
    background: #333;
    padding: 10px;
    text-align: center;
}

nav button {
    margin: 5px;
    padding: 8px;
    color: white;
    background: #444;
    border: none;
    cursor: pointer;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 200px;
    padding: 10px;
    border-right: 1px solid #ccc;
}

.sidebar input, .sidebar select {
    width: 100%;
    margin-bottom: 10px;
    padding: 5px;
}

/* Products */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    border: 1px solid #ccc;
    margin: 10px;
    padding: 10px;
    width: 200px;
    text-align: center;
}

/* Sections */
.section { display: none; padding: 20px; }
.active { display: block; }

/* Cart */
.cart-item {
    border-bottom: 1px solid #ccc;
    padding: 5px;
}
</style>
</head>

<body>

<header>
<h1>🛍️ Family Bazar</h1>
<p>Everything Your Family Needs</p>
</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('cart')">Cart</button>
<button onclick="showSection('orders'); showOrders()">Orders</button>
<button onclick="showSection('login')">Login</button>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<div class="container">

<!-- Sidebar -->
<div class="sidebar">
<h3>Filter</h3>

<select id="category" onchange="applyFilter()">
<option value="all">All</option>
<option value="clothes">Clothes</option>
<option value="electronics">Electronics</option>
<option value="home">Home</option>
</select>

<input type="number" id="price" placeholder="Max Price" onkeyup="applyFilter()">
<input type="text" id="search" placeholder="Search..." onkeyup="applyFilter()">

</div>

<!-- Products -->
<div class="products">

<div class="card" data-category="clothes" data-price="500">
<h3>Shirt</h3>
<p>₹500</p>

<p>
<span onclick="rate(this,1)">★</span>
<span onclick="rate(this,2)">★</span>
<span onclick="rate(this,3)">★</span>
<span onclick="rate(this,4)">★</span>
<span onclick="rate(this,5)">★</span>
</p>

<button onclick="addToCart('Shirt',500)">Add</button>
<button onclick="addToWishlist('Shirt')">❤️</button>
</div>

<div class="card" data-category="electronics" data-price="15000">
<h3>Mobile</h3>
<p>₹15000</p>

<p>
<span onclick="rate(this,1)">★</span>
<span onclick="rate(this,2)">★</span>
<span onclick="rate(this,3)">★</span>
<span onclick="rate(this,4)">★</span>
<span onclick="rate(this,5)">★</span>
</p>

<button onclick="addToCart('Mobile',15000)">Add</button>
<button onclick="addToWishlist('Mobile')">❤️</button>
</div>

<div class="card" data-category="home" data-price="2000">
<h3>Chair</h3>
<p>₹2000</p>

<p>
<span onclick="rate(this,1)">★</span>
<span onclick="rate(this,2)">★</span>
<span onclick="rate(this,3)">★</span>
<span onclick="rate(this,4)">★</span>
<span onclick="rate(this,5)">★</span>
</p>

<button onclick="addToCart('Chair',2000)">Add</button>
<button onclick="addToWishlist('Chair')">❤️</button>
</div>

</div>
</div>
</div>

<!-- CART -->
<div id="cart" class="section">
<h2>🛒 Cart</h2>
<div id="cart-items"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<button onclick="showSection('payment')">Checkout</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="section">
<h2>Payment</h2>
<button onclick="pay('UPI')">UPI</button>
<button onclick="pay('Card')">Card</button>
</div>

<!-- ORDERS -->
<div id="orders" class="section">
<h2>🧾 Order History</h2>
<div id="order-list"></div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Login</h2>
<input placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="alert('Login Success')">Login</button>
</div>

<script>
let cart = [];
let total = 0;
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// Navigation
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// Cart
function addToCart(name, price){
cart.push({name, price});
total += price;
updateCart();
}

function updateCart(){
let html="";
cart.forEach((item,i)=>{
html += `<div class="cart-item">${item.name} ₹${item.price}
<button onclick="removeItem(${i})">❌</button></div>`;
});
document.getElementById("cart-items").innerHTML = html;
document.getElementById("total").innerText = total;
}

function removeItem(i){
total -= cart[i].price;
cart.splice(i,1);
updateCart();
}

// Payment
function pay(method){
alert("Paid via " + method);
orders.push([...cart]);
localStorage.setItem("orders", JSON.stringify(orders));
cart=[]; total=0;
updateCart();
showSection('home');
}

// Orders
function showOrders(){
let html="";
orders.forEach((o,i)=>{
html += <p>Order ${i+1}: ${o.map(x=>x.name).join(", ")}</p>;
});
document.getElementById("order-list").innerHTML = html;
}

// Wishlist
function addToWishlist(name){
wishlist.push(name);
localStorage.setItem("wishlist", JSON.stringify(wishlist));
alert(name + " added ❤️");
}

// Rating
function rate(el,val){
let stars=el.parentNode.children;
for(let i=0;i<stars.length;i++){
stars[i].style.color = i < val ? "gold" : "black";
}
}

// Filter
function applyFilter(){
let cat=document.getElementById("category").value;
let price=document.getElementById("price").value;
let search=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{
let c=card.dataset.category;
let p=card.dataset.price;
let t=card.querySelector("h3").innerText.toLowerCase();

let show=true;

if(cat!="all" && c!=cat) show=false;
if(price && p>price) show=false;
if(!t.includes(search)) show=false;

card.style.display = show ? "block" : "none";
});
}
</script>

</body>
</html>
